<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 読解ガイド</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1e1e2e; --bg-raised: #262638; --code-bg: #2d2d3f;
  --accent: #7c3aed; --accent-dim: rgba(124,58,237,0.25);
  --fg: #e4e4f0; --fg-dim: #9494ac; --fg-bright: #fff;
  --border: #3a3a52; --success: #34d399;
  --radius: 10px;
  --font-ui: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic UI", sans-serif;
  --font-mono: "JetBrains Mono", "Fira Code", "Consolas", monospace;
}
body { font-family: var(--font-ui); background: var(--bg); color: var(--fg); line-height: 1.8; min-height: 100vh; }
body::before { content: ''; position: fixed; top: -30%; left: -20%; width: 70vw; height: 70vw; background: radial-gradient(circle, rgba(124,58,237,0.07) 0%, transparent 65%); pointer-events: none; }
.container { max-width: 780px; margin: 0 auto; padding: 48px 20px 60px; position: relative; z-index: 1; }
h1 { font-size: 32px; font-weight: 800; color: var(--fg-bright); margin-bottom: 8px; }
h1 span { color: var(--accent); }
.subtitle { color: var(--fg-dim); font-size: 16px; margin-bottom: 48px; }
.section-title { font-size: 18px; font-weight: 700; color: var(--fg-bright); margin-bottom: 16px; }
.card-grid { display: grid; gap: 12px; margin-bottom: 48px; }
.card {
  display: flex; align-items: center; gap: 16px;
  background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 22px; text-decoration: none; color: var(--fg); transition: all 0.25s ease;
}
.card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(124,58,237,0.2); }
.card-num {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  background: var(--accent); color: #fff; font-weight: 700; font-size: 14px;
  border-radius: 8px; flex-shrink: 0;
}
.card-body { flex: 1; }
.card-title { font-size: 15px; font-weight: 600; color: var(--fg-bright); }
.card-desc { font-size: 13px; color: var(--fg-dim); margin-top: 2px; }
.card-arrow { color: var(--fg-dim); font-size: 18px; transition: transform 0.25s ease; }
.card:hover .card-arrow { transform: translateX(4px); color: var(--accent); }
.badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
.badge-interactive { background: rgba(52,211,153,0.15); color: var(--success); }
.footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); color: var(--fg-dim); font-size: 13px; text-align: center; }
.footer a { color: var(--accent); text-decoration: none; }
@media (max-width: 600px) { .container { padding: 32px 14px 48px; } h1 { font-size: 24px; } }
</style>
</head>
<body>
<div class="container">
  <h1>Python <span>読解ガイド</span></h1>
  <p class="subtitle">コードを書かずに「読める」ようになるためのインタラクティブ教科書</p>

  <div class="section-title">01. 基礎（Basics）</div>
  <div class="card-grid">
    <a class="card" href="01_basics/interactive/01_variables.html">
      <div class="card-num">1</div>
      <div class="card-body">
        <div class="card-title">変数（variable）<span class="badge badge-interactive">Interactive</span></div>
        <div class="card-desc">データを入れる箱。= の読み方、上書き、自己更新</div>
      </div>
      <span class="card-arrow">&rarr;</span>
    </a>
  </div>

  <div class="section-title">02. Python構文（Syntax）</div>
  <div class="card-grid">
    <div class="card" style="opacity:0.5; cursor:default;">
      <div class="card-num">2</div>
      <div class="card-body"><div class="card-title">インデント・f文字列・リスト内包表記...</div><div class="card-desc">順次HTML化予定</div></div>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/fukukei23/python-reading-guide">GitHub リポジトリ</a> &middot; Markdown版は各ディレクトリの .md ファイルをご覧ください
  </div>
</div>
</body>
</html>
